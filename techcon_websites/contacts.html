<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Contact Us - TechCon 2024</title>
</head>
<body>
  <header>
    <h1>Contact Us</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Contact Information</h2>
      <p>Email: <a href="mailto:email@example.com">email@example.com</a></p>
      <p>
        Follow us:
        <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a> |
        <a href="https://www.linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      </p>

      <!-- Responsive embedded Google Map -->
      <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">
        <iframe
          src="https://www.google.com/maps?q=conference+center&output=embed"
          style="position:absolute;left:0;top:0;width:100%;height:100%;border:0;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="TechCon venue map">
        </iframe>
      </div>
    </section>

    <section>
      <h2>Contact Us</h2>
      <form action="#" method="post">
        <label for="cname">Name</label><br>
        <input type="text" id="cname" name="name" required><br><br>

        <label for="cemail">Email</label><br>
        <input type="email" id="cemail" name="email" required><br><br>

        <label for="cmessage">Message</label><br>
        <textarea id="cmessage" name="message" rows="5" cols="40" required></textarea><br><br>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>copyright © 2024 TechCon</p>
  </footer>
</body>
</html>
